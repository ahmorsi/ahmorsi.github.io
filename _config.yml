theme: jekyll-theme-chirpy

lang: en

# Change to your timezone › https://kevinnovak.github.io/Time-Zone-Picker
timezone: Europe/Berlin

future: true

title: Ahmed Abdelbaki
tagline: Senior AI Engineer
description: >-
  Thoughts on AI, Data Engineering, MLOps, Cloud, Agentic AI, Robotics, and Smart Home.

url: "https://ahmorsi.github.io"

github:
  username: ahmorsi

# twitter:
#   username: your_twitter_handle

social:
  name: Ahmed Abdelbaki
  email: ahmed.emad.morsy@gmail.com
  links:
    - https://github.com/ahmorsi
    - https://www.linkedin.com/in/aabdelbaki9/

# google_site_verification: # get from Google Search Console

theme_mode: auto  # light | dark | auto

avatar: assets/img/me.jpeg

toc: true

comments:
  provider: false

assets:
  self_host:
    enabled: false

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

# ---- Do not modify below unless you know what you're doing ----

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
